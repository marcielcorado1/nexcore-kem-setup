services:
  evonexus_dashboard:
    image: 'evoapicloud/evo-nexus-dashboard:latest'
    container_name: evonexus_dashboard
    restart: unless-stopped
    command:
      - /bin/bash
      - /workspace/workspace/arquivos/dashboard-startup.sh
    environment:
      - TZ=America/Sao_Paulo
      - EVONEXUS_PORT=8080
      - TERMINAL_SERVER_PORT=32352
      - 'FORWARDED_ALLOW_IPS=*'
      - CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS=1
    volumes:
      - 'evonexus_config:/workspace/config'
      - 'evonexus_workspace:/workspace/workspace'
      - 'evonexus_dashboard_data:/workspace/dashboard/data'
      - 'evonexus_memory:/workspace/memory'
      - 'evonexus_adw_logs:/workspace/ADWs/logs'
      - 'evonexus_adw_custom:/workspace/ADWs/routines/custom'
      - 'evonexus_agents_custom:/workspace/.claude/agents'
      - 'evonexus_skills_custom:/workspace/.claude/skills'
      - 'evonexus_commands_custom:/workspace/.claude/commands'
      - 'evonexus_templates:/workspace/.claude/templates'
      - 'evonexus_rules:/workspace/.claude/rules'
      - 'evonexus_hooks:/workspace/.claude/hooks'
      - 'evonexus_agent_memory:/workspace/.claude/agent-memory'
      - 'evonexus_claude_auth:/root/.claude'
      - 'evonexus_codex_auth:/root/.codex'
      - 'evonexus_terminal_sessions:/root/.claude-code-web'
    networks:
      - coolify
    mem_limit: 8192m
    cpus: 4
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -sf http://localhost:8080/api/health || exit 1'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.evonexus_dashboard.rule=Host(`nexcore.oracle.kemsolucoes.com.br`)
      - traefik.http.routers.evonexus_dashboard.entrypoints=https
      - traefik.http.routers.evonexus_dashboard.priority=1
      - traefik.http.routers.evonexus_dashboard.tls=true
      - traefik.http.routers.evonexus_dashboard.tls.certresolver=letsencrypt
      - traefik.http.routers.evonexus_dashboard.service=evonexus_dashboard
      - traefik.http.services.evonexus_dashboard.loadbalancer.server.port=8080
      - traefik.http.services.evonexus_dashboard.loadbalancer.passHostHeader=true
      - 'traefik.http.routers.evonexus_terminal.rule=Host(`nexcore.oracle.kemsolucoes.com.br`) && PathPrefix(`/terminal`)'
      - traefik.http.routers.evonexus_terminal.entrypoints=https
      - traefik.http.routers.evonexus_terminal.priority=10
      - traefik.http.routers.evonexus_terminal.tls=true
      - traefik.http.routers.evonexus_terminal.tls.certresolver=letsencrypt
      - traefik.http.routers.evonexus_terminal.service=evonexus_terminal
      - traefik.http.routers.evonexus_terminal.middlewares=evonexus_terminal_strip
      - traefik.http.middlewares.evonexus_terminal_strip.stripprefix.prefixes=/terminal
      - traefik.http.services.evonexus_terminal.loadbalancer.server.port=32352
      - traefik.http.services.evonexus_terminal.loadbalancer.passHostHeader=true
  evonexus_social_auth:
    image: 'evoapicloud/evo-nexus-dashboard:latest'
    container_name: evonexus_social_auth
    restart: unless-stopped
    command:
      - uv
      - run
      - python
      - /workspace/workspace/arquivos/start-social-auth.py
    environment:
      - TZ=America/Sao_Paulo
      - SOCIAL_AUTH_PORT=8765
    volumes:
      - 'evonexus_workspace:/workspace/workspace'
      - 'evonexus_config:/workspace/config'
      - 'evonexus_claude_auth:/root/.claude'
    networks:
      - coolify
    mem_limit: 512m
    cpus: 1
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -s http://localhost:8765/ > /dev/null 2>&1 || exit 1'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - 'traefik.http.routers.evonexus_social_auth.rule=Host(`nexcore.oracle.kemsolucoes.com.br`) && PathPrefix(`/social-auth`)'
      - traefik.http.routers.evonexus_social_auth.entrypoints=https
      - traefik.http.routers.evonexus_social_auth.priority=20
      - traefik.http.routers.evonexus_social_auth.tls=true
      - traefik.http.routers.evonexus_social_auth.tls.certresolver=letsencrypt
      - traefik.http.routers.evonexus_social_auth.service=evonexus_social_auth
      - traefik.http.routers.evonexus_social_auth.middlewares=evonexus_social_auth_strip
      - traefik.http.middlewares.evonexus_social_auth_strip.stripprefix.prefixes=/social-auth
      - traefik.http.services.evonexus_social_auth.loadbalancer.server.port=8765
      - traefik.http.services.evonexus_social_auth.loadbalancer.passHostHeader=true
  evonexus_telegram:
    image: 'evoapicloud/evo-nexus-runtime:latest'
    container_name: evonexus_telegram
    restart: unless-stopped
    command:
      - claude
      - '--channels'
      - 'plugin:telegram@claude-plugins-official'
      - '--dangerously-skip-permissions'
    environment:
      - TZ=America/Sao_Paulo
      - REQUIRE_ANTHROPIC_KEY=1
    stdin_open: true
    tty: true
    volumes:
      - 'evonexus_config:/workspace/config'
      - 'evonexus_workspace:/workspace/workspace'
      - 'evonexus_memory:/workspace/memory'
      - 'evonexus_adw_logs:/workspace/ADWs/logs'
      - 'evonexus_adw_custom:/workspace/ADWs/routines/custom'
      - 'evonexus_agents_custom:/workspace/.claude/agents'
      - 'evonexus_skills_custom:/workspace/.claude/skills'
      - 'evonexus_commands_custom:/workspace/.claude/commands'
      - 'evonexus_templates:/workspace/.claude/templates'
      - 'evonexus_rules:/workspace/.claude/rules'
      - 'evonexus_hooks:/workspace/.claude/hooks'
      - 'evonexus_agent_memory:/workspace/.claude/agent-memory'
      - 'evonexus_claude_auth:/root/.claude'
      - 'evonexus_codex_auth:/root/.codex'
    networks:
      - coolify
    mem_limit: 4096m
    cpus: 4
    healthcheck:
      test:
        - CMD-SHELL
        - 'test -d /proc/1 || exit 1'
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s
  evonexus_scheduler:
    image: 'evoapicloud/evo-nexus-runtime:latest'
    container_name: evonexus_scheduler
    restart: on-failure
    command:
      - /bin/bash
      - /workspace/workspace/arquivos/scheduler-startup.sh
    environment:
      - TZ=America/Sao_Paulo
      - CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS=1
    volumes:
      - 'evonexus_config:/workspace/config'
      - 'evonexus_workspace:/workspace/workspace'
      - 'evonexus_memory:/workspace/memory'
      - 'evonexus_adw_logs:/workspace/ADWs/logs'
      - 'evonexus_adw_custom:/workspace/ADWs/routines/custom'
      - 'evonexus_agents_custom:/workspace/.claude/agents'
      - 'evonexus_skills_custom:/workspace/.claude/skills'
      - 'evonexus_commands_custom:/workspace/.claude/commands'
      - 'evonexus_templates:/workspace/.claude/templates'
      - 'evonexus_rules:/workspace/.claude/rules'
      - 'evonexus_hooks:/workspace/.claude/hooks'
      - 'evonexus_agent_memory:/workspace/.claude/agent-memory'
      - 'evonexus_codex_auth:/root/.codex'
      - 'evonexus_claude_auth:/root/.claude'
    networks:
      - coolify
    mem_limit: 4096m
    cpus: 4
    healthcheck:
      test:
        - CMD-SHELL
        - 'test -d /proc/1 || exit 1'
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s
volumes:
  evonexus_config: null
  evonexus_workspace: null
  evonexus_dashboard_data: null
  evonexus_memory: null
  evonexus_adw_logs: null
  evonexus_adw_custom: null
  evonexus_agents_custom: null
  evonexus_skills_custom: null
  evonexus_commands_custom: null
  evonexus_templates: null
  evonexus_rules: null
  evonexus_hooks: null
  evonexus_agent_memory: null
  evonexus_claude_auth: null
  evonexus_codex_auth: null
  evonexus_terminal_sessions: null
networks:
  coolify:
    external: true
    name: coolify
