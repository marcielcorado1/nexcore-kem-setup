# ================================================================
# EvoNexus (NEXCORE) — Template de Deploy para Alunos
# ================================================================
# ANTES DE COLAR NO COOLIFY:
# Substitua "nexcore.seudominio.com.br" pelo seu domínio real.
# Esse domínio deve ter um registro DNS apontando para o IP da sua VPS.
#
# Todos os containers, volumes e routers usam o prefixo "nexcore_".
# Não é necessário alterar o prefixo — ele garante isolamento na VPS.
# ================================================================

services:
  nexcore_dashboard:
    image: 'evoapicloud/evo-nexus-dashboard:latest'
    container_name: nexcore_dashboard
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
      - EVONEXUS_PORT=8080
      - TERMINAL_SERVER_PORT=32352
      - 'FORWARDED_ALLOW_IPS=*'
      - CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS=1
    volumes:
      - 'nexcore_config:/workspace/config'
      - 'nexcore_workspace:/workspace/workspace'
      - 'nexcore_dashboard_data:/workspace/dashboard/data'
      - 'nexcore_memory:/workspace/memory'
      - 'nexcore_adw_logs:/workspace/ADWs/logs'
      - 'nexcore_adw_custom:/workspace/ADWs/routines/custom'
      - 'nexcore_agents_custom:/workspace/.claude/agents'
      - 'nexcore_skills_custom:/workspace/.claude/skills'
      - 'nexcore_commands_custom:/workspace/.claude/commands'
      - 'nexcore_templates:/workspace/.claude/templates'
      - 'nexcore_rules:/workspace/.claude/rules'
      - 'nexcore_hooks:/workspace/.claude/hooks'
      - 'nexcore_agent_memory:/workspace/.claude/agent-memory'
      - 'nexcore_claude_auth:/root/.claude'
      - 'nexcore_codex_auth:/root/.codex'
      - 'nexcore_terminal_sessions:/root/.claude-code-web'
    networks:
      - coolify
    mem_limit: 8192m
    cpus: 4
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -sf http://localhost:8080/api/health || exit 1'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.nexcore_dashboard.rule=Host(`nexcore.seudominio.com.br`)
      - traefik.http.routers.nexcore_dashboard.entrypoints=https
      - traefik.http.routers.nexcore_dashboard.priority=1
      - traefik.http.routers.nexcore_dashboard.tls=true
      - traefik.http.routers.nexcore_dashboard.tls.certresolver=letsencrypt
      - traefik.http.routers.nexcore_dashboard.service=nexcore_dashboard
      - traefik.http.services.nexcore_dashboard.loadbalancer.server.port=8080
      - traefik.http.services.nexcore_dashboard.loadbalancer.passHostHeader=true
      - 'traefik.http.routers.nexcore_terminal.rule=Host(`nexcore.seudominio.com.br`) && PathPrefix(`/terminal`)'
      - traefik.http.routers.nexcore_terminal.entrypoints=https
      - traefik.http.routers.nexcore_terminal.priority=10
      - traefik.http.routers.nexcore_terminal.tls=true
      - traefik.http.routers.nexcore_terminal.tls.certresolver=letsencrypt
      - traefik.http.routers.nexcore_terminal.service=nexcore_terminal
      - traefik.http.routers.nexcore_terminal.middlewares=nexcore_terminal_strip
      - traefik.http.middlewares.nexcore_terminal_strip.stripprefix.prefixes=/terminal
      - traefik.http.services.nexcore_terminal.loadbalancer.server.port=32352
      - traefik.http.services.nexcore_terminal.loadbalancer.passHostHeader=true

  nexcore_social_auth:
    image: 'evoapicloud/evo-nexus-dashboard:latest'
    container_name: nexcore_social_auth
    restart: unless-stopped
    command:
      - uv
      - run
      - python
      - /workspace/workspace/arquivos/start-social-auth.py
    environment:
      - TZ=America/Sao_Paulo
      - SOCIAL_AUTH_PORT=8765
    volumes:
      - 'nexcore_workspace:/workspace/workspace'
      - 'nexcore_config:/workspace/config'
      - 'nexcore_claude_auth:/root/.claude'
    networks:
      - coolify
    mem_limit: 512m
    cpus: 1
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -s http://localhost:8765/ > /dev/null 2>&1 || exit 1'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - 'traefik.http.routers.nexcore_social_auth.rule=Host(`nexcore.seudominio.com.br`) && PathPrefix(`/social-auth`)'
      - traefik.http.routers.nexcore_social_auth.entrypoints=https
      - traefik.http.routers.nexcore_social_auth.priority=20
      - traefik.http.routers.nexcore_social_auth.tls=true
      - traefik.http.routers.nexcore_social_auth.tls.certresolver=letsencrypt
      - traefik.http.routers.nexcore_social_auth.service=nexcore_social_auth
      - traefik.http.routers.nexcore_social_auth.middlewares=nexcore_social_auth_strip
      - traefik.http.middlewares.nexcore_social_auth_strip.stripprefix.prefixes=/social-auth
      - traefik.http.services.nexcore_social_auth.loadbalancer.server.port=8765
      - traefik.http.services.nexcore_social_auth.loadbalancer.passHostHeader=true

  nexcore_telegram:
    image: 'evoapicloud/evo-nexus-runtime:latest'
    container_name: nexcore_telegram
    restart: unless-stopped
    command:
      - claude
      - '--channels'
      - 'plugin:telegram@claude-plugins-official'
      - '--dangerously-skip-permissions'
    environment:
      - TZ=America/Sao_Paulo
      - REQUIRE_ANTHROPIC_KEY=1
    stdin_open: true
    tty: true
    volumes:
      - 'nexcore_config:/workspace/config'
      - 'nexcore_workspace:/workspace/workspace'
      - 'nexcore_memory:/workspace/memory'
      - 'nexcore_adw_logs:/workspace/ADWs/logs'
      - 'nexcore_adw_custom:/workspace/ADWs/routines/custom'
      - 'nexcore_agents_custom:/workspace/.claude/agents'
      - 'nexcore_skills_custom:/workspace/.claude/skills'
      - 'nexcore_commands_custom:/workspace/.claude/commands'
      - 'nexcore_templates:/workspace/.claude/templates'
      - 'nexcore_rules:/workspace/.claude/rules'
      - 'nexcore_hooks:/workspace/.claude/hooks'
      - 'nexcore_agent_memory:/workspace/.claude/agent-memory'
      - 'nexcore_claude_auth:/root/.claude'
      - 'nexcore_codex_auth:/root/.codex'
    networks:
      - coolify
    mem_limit: 4096m
    cpus: 4
    healthcheck:
      test:
        - CMD-SHELL
        - 'test -d /proc/1 || exit 1'
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

  nexcore_scheduler:
    image: 'evoapicloud/evo-nexus-runtime:latest'
    container_name: nexcore_scheduler
    restart: on-failure
    command:
      - /bin/bash
      - /workspace/workspace/arquivos/scheduler-startup.sh
    environment:
      - TZ=America/Sao_Paulo
      - CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS=1
    volumes:
      - 'nexcore_config:/workspace/config'
      - 'nexcore_workspace:/workspace/workspace'
      - 'nexcore_memory:/workspace/memory'
      - 'nexcore_adw_logs:/workspace/ADWs/logs'
      - 'nexcore_adw_custom:/workspace/ADWs/routines/custom'
      - 'nexcore_agents_custom:/workspace/.claude/agents'
      - 'nexcore_skills_custom:/workspace/.claude/skills'
      - 'nexcore_commands_custom:/workspace/.claude/commands'
      - 'nexcore_templates:/workspace/.claude/templates'
      - 'nexcore_rules:/workspace/.claude/rules'
      - 'nexcore_hooks:/workspace/.claude/hooks'
      - 'nexcore_agent_memory:/workspace/.claude/agent-memory'
      - 'nexcore_codex_auth:/root/.codex'
      - 'nexcore_claude_auth:/root/.claude'
    networks:
      - coolify
    mem_limit: 4096m
    cpus: 4
    healthcheck:
      test:
        - CMD-SHELL
        - 'test -d /proc/1 || exit 1'
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  nexcore_config: null
  nexcore_workspace: null
  nexcore_dashboard_data: null
  nexcore_memory: null
  nexcore_adw_logs: null
  nexcore_adw_custom: null
  nexcore_agents_custom: null
  nexcore_skills_custom: null
  nexcore_commands_custom: null
  nexcore_templates: null
  nexcore_rules: null
  nexcore_hooks: null
  nexcore_agent_memory: null
  nexcore_claude_auth: null
  nexcore_codex_auth: null
  nexcore_terminal_sessions: null

networks:
  coolify:
    external: true
    name: coolify
