# ================================================================
# EvoNexus Stack — TESTE / nexcore2
# ================================================================
# Stack paralela para testes na mesma VPS.
# Containers, volumes e routers Traefik usam prefixo "evonexus2_"
# para não conflitar com a stack principal (evonexus_*).
#
# Domínio: nexcore2.kemsolucoes.com.br
# ================================================================

services:
  evonexus2_dashboard:
    image: 'evoapicloud/evo-nexus-dashboard:latest'
    container_name: evonexus2_dashboard
    restart: unless-stopped
    command:
      - /bin/bash
      - /workspace/workspace/arquivos/dashboard-startup.sh
    environment:
      - TZ=America/Sao_Paulo
      - EVONEXUS_PORT=8080
      - TERMINAL_SERVER_PORT=32352
      - 'FORWARDED_ALLOW_IPS=*'
      - CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS=1
    volumes:
      - 'evonexus2_config:/workspace/config'
      - 'evonexus2_workspace:/workspace/workspace'
      - 'evonexus2_dashboard_data:/workspace/dashboard/data'
      - 'evonexus2_memory:/workspace/memory'
      - 'evonexus2_adw_logs:/workspace/ADWs/logs'
      - 'evonexus2_adw_custom:/workspace/ADWs/routines/custom'
      - 'evonexus2_agents_custom:/workspace/.claude/agents'
      - 'evonexus2_skills_custom:/workspace/.claude/skills'
      - 'evonexus2_commands_custom:/workspace/.claude/commands'
      - 'evonexus2_templates:/workspace/.claude/templates'
      - 'evonexus2_rules:/workspace/.claude/rules'
      - 'evonexus2_hooks:/workspace/.claude/hooks'
      - 'evonexus2_agent_memory:/workspace/.claude/agent-memory'
      - 'evonexus2_claude_auth:/root/.claude'
      - 'evonexus2_codex_auth:/root/.codex'
      - 'evonexus2_terminal_sessions:/root/.claude-code-web'
    networks:
      - coolify
    mem_limit: 8192m
    cpus: 4
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -sf http://localhost:8080/api/health || exit 1'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.evonexus2_dashboard.rule=Host(`nexcore2.kemsolucoes.com.br`)
      - traefik.http.routers.evonexus2_dashboard.entrypoints=https
      - traefik.http.routers.evonexus2_dashboard.priority=1
      - traefik.http.routers.evonexus2_dashboard.tls=true
      - traefik.http.routers.evonexus2_dashboard.tls.certresolver=letsencrypt
      - traefik.http.routers.evonexus2_dashboard.service=evonexus2_dashboard
      - traefik.http.services.evonexus2_dashboard.loadbalancer.server.port=8080
      - traefik.http.services.evonexus2_dashboard.loadbalancer.passHostHeader=true
      - 'traefik.http.routers.evonexus2_terminal.rule=Host(`nexcore2.kemsolucoes.com.br`) && PathPrefix(`/terminal`)'
      - traefik.http.routers.evonexus2_terminal.entrypoints=https
      - traefik.http.routers.evonexus2_terminal.priority=10
      - traefik.http.routers.evonexus2_terminal.tls=true
      - traefik.http.routers.evonexus2_terminal.tls.certresolver=letsencrypt
      - traefik.http.routers.evonexus2_terminal.service=evonexus2_terminal
      - traefik.http.routers.evonexus2_terminal.middlewares=evonexus2_terminal_strip
      - traefik.http.middlewares.evonexus2_terminal_strip.stripprefix.prefixes=/terminal
      - traefik.http.services.evonexus2_terminal.loadbalancer.server.port=32352
      - traefik.http.services.evonexus2_terminal.loadbalancer.passHostHeader=true

  evonexus2_social_auth:
    image: 'evoapicloud/evo-nexus-dashboard:latest'
    container_name: evonexus2_social_auth
    restart: unless-stopped
    command:
      - uv
      - run
      - python
      - /workspace/workspace/arquivos/start-social-auth.py
    environment:
      - TZ=America/Sao_Paulo
      - SOCIAL_AUTH_PORT=8765
    volumes:
      - 'evonexus2_workspace:/workspace/workspace'
      - 'evonexus2_config:/workspace/config'
      - 'evonexus2_claude_auth:/root/.claude'
    networks:
      - coolify
    mem_limit: 512m
    cpus: 1
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -s http://localhost:8765/ > /dev/null 2>&1 || exit 1'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - 'traefik.http.routers.evonexus2_social_auth.rule=Host(`nexcore2.kemsolucoes.com.br`) && PathPrefix(`/social-auth`)'
      - traefik.http.routers.evonexus2_social_auth.entrypoints=https
      - traefik.http.routers.evonexus2_social_auth.priority=20
      - traefik.http.routers.evonexus2_social_auth.tls=true
      - traefik.http.routers.evonexus2_social_auth.tls.certresolver=letsencrypt
      - traefik.http.routers.evonexus2_social_auth.service=evonexus2_social_auth
      - traefik.http.routers.evonexus2_social_auth.middlewares=evonexus2_social_auth_strip
      - traefik.http.middlewares.evonexus2_social_auth_strip.stripprefix.prefixes=/social-auth
      - traefik.http.services.evonexus2_social_auth.loadbalancer.server.port=8765
      - traefik.http.services.evonexus2_social_auth.loadbalancer.passHostHeader=true

  evonexus2_telegram:
    image: 'evoapicloud/evo-nexus-runtime:latest'
    container_name: evonexus2_telegram
    restart: unless-stopped
    command:
      - claude
      - '--channels'
      - 'plugin:telegram@claude-plugins-official'
      - '--dangerously-skip-permissions'
    environment:
      - TZ=America/Sao_Paulo
      - REQUIRE_ANTHROPIC_KEY=1
    stdin_open: true
    tty: true
    volumes:
      - 'evonexus2_config:/workspace/config'
      - 'evonexus2_workspace:/workspace/workspace'
      - 'evonexus2_memory:/workspace/memory'
      - 'evonexus2_adw_logs:/workspace/ADWs/logs'
      - 'evonexus2_adw_custom:/workspace/ADWs/routines/custom'
      - 'evonexus2_agents_custom:/workspace/.claude/agents'
      - 'evonexus2_skills_custom:/workspace/.claude/skills'
      - 'evonexus2_commands_custom:/workspace/.claude/commands'
      - 'evonexus2_templates:/workspace/.claude/templates'
      - 'evonexus2_rules:/workspace/.claude/rules'
      - 'evonexus2_hooks:/workspace/.claude/hooks'
      - 'evonexus2_agent_memory:/workspace/.claude/agent-memory'
      - 'evonexus2_claude_auth:/root/.claude'
      - 'evonexus2_codex_auth:/root/.codex'
    networks:
      - coolify
    mem_limit: 4096m
    cpus: 4
    healthcheck:
      test:
        - CMD-SHELL
        - 'test -d /proc/1 || exit 1'
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

  evonexus2_scheduler:
    image: 'evoapicloud/evo-nexus-runtime:latest'
    container_name: evonexus2_scheduler
    restart: on-failure
    command:
      - /bin/bash
      - /workspace/workspace/arquivos/scheduler-startup.sh
    environment:
      - TZ=America/Sao_Paulo
      - CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS=1
    volumes:
      - 'evonexus2_config:/workspace/config'
      - 'evonexus2_workspace:/workspace/workspace'
      - 'evonexus2_memory:/workspace/memory'
      - 'evonexus2_adw_logs:/workspace/ADWs/logs'
      - 'evonexus2_adw_custom:/workspace/ADWs/routines/custom'
      - 'evonexus2_agents_custom:/workspace/.claude/agents'
      - 'evonexus2_skills_custom:/workspace/.claude/skills'
      - 'evonexus2_commands_custom:/workspace/.claude/commands'
      - 'evonexus2_templates:/workspace/.claude/templates'
      - 'evonexus2_rules:/workspace/.claude/rules'
      - 'evonexus2_hooks:/workspace/.claude/hooks'
      - 'evonexus2_agent_memory:/workspace/.claude/agent-memory'
      - 'evonexus2_codex_auth:/root/.codex'
      - 'evonexus2_claude_auth:/root/.claude'
    networks:
      - coolify
    mem_limit: 4096m
    cpus: 4
    healthcheck:
      test:
        - CMD-SHELL
        - 'test -d /proc/1 || exit 1'
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  evonexus2_config: null
  evonexus2_workspace: null
  evonexus2_dashboard_data: null
  evonexus2_memory: null
  evonexus2_adw_logs: null
  evonexus2_adw_custom: null
  evonexus2_agents_custom: null
  evonexus2_skills_custom: null
  evonexus2_commands_custom: null
  evonexus2_templates: null
  evonexus2_rules: null
  evonexus2_hooks: null
  evonexus2_agent_memory: null
  evonexus2_claude_auth: null
  evonexus2_codex_auth: null
  evonexus2_terminal_sessions: null

networks:
  coolify:
    external: true
    name: coolify
